name: "vprofile IAC"
on:
  push:
    branches:
      - main
      - stage
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}

  
  EKS_CLUSTER: vprofile-eks

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.1.7

      - name: Terraform Init
        id: init #we can reference this step later if needed
        run: |
          terraform init -backend-config="bucket=${{ env.BUCKET_TF_STATE }}"
      
      - name: Terraform format
        id: fmt #for referencing later if needed
        run: |
          terraform fmt -check

      - name: Terraform Validate
        id: validate #for referencing later if needed
        run: |
          terraform validate

      - name: Terraform plan
        id: plan #for referencing later if needed
        run: |
          terraform plan -input=false -out=tfplan
          continue-on-error: true
      
      - name: terraform plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

     