name: "iac-app13"
on:
  push:
    branches:
      - main
      - stage
    paths: 
      - terraform/**
  pull_request:
    branches:
      - main
    paths: 
      - terraform/**

env:
# credentials for deployment to AWS
 AWS_ACCESS_KEY_ID13: ${{ secrets.AWS_ACCESS_KEY_ID13}}
 AWS_SECRET_ACCESS_KEY13: ${{ secrets.AWS_SECRET_ACCESS_KEY13}}

#S3 Bucket for the Terraform state
 BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE}}
 AWS_REGION: ap-south-1
 EKS_CLUSTER: app13-eks

jobs:
  terraform:
    name: "Apply terraform code changes"
    runs-on: ubuntu-latest
    defaults:
       run:
         shell: bash
         working-directory: ./terraform
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup with specified version on the runner
        uses: hasicorp/setup-terraform@v2
      # with:
         #terraform_version: 1.6.3

      - name: Terraform init
        id:  init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform format
        id: fmt
        run: terraform fmt -check

      - name: Terraform validate 
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out planfile
        continue-on-error: true

      - name: Terrafom plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1



