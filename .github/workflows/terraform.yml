name: "Vprofile IAC"

on:
  push:
    branches:
      - main
      - _stage
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1
  EKS_CLUSTER: vprofile-eks

jobs:
  terraform:
    name: "Apply Terraform Code Changes"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      # Step 1: Check out source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Set up Terraform on the runner
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.3

      # Step 3: Initialize Terraform
      - name: Terraform init
        id: init
        run: terraform init -backend-config="bucket=${{ env.BUCKET_TF_STATE }}"

      # Step 4: Format check
      - name: Terraform format
        id: fmt
        run: terraform fmt -check

      # Step 5: Validate the Terraform code
      - name: Terraform validate
        id: validate
        run: terraform validate

      # Step 6: Generate a Terraform plan
      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=planfile

      # Step 7: Check if the plan step failed
      - name: Terraform plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
