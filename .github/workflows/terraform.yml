name: "Vprofile IAC"
on: 
  push:
    branches:
      - main
      - stage
    paths:
      - terraform/**   
       
  pull_request:
    branches:
      - main
    paths:
      - terraform/**


env: 
  AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
  AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
  BUCKET_TF_STATE: ${{secrets.BUCKET_TF_STATE}}
  AWS_REGION: us-east-2
  EKS_CLUSTER_NAME: vprofile-eks


jobs:
  terraform:
    name: "Apply terraform code changes"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: "checkout source code"
        uses: actions/checkout@v4

      - name: "Setup Terraform with specified version on the runner"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.3
          

      - name: "Terraform Init"
        id: init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"


      - name: "Terraform format"
        id: format
        run: terraform fmt -check

      - name: "Terraform validate"
        id: validate
        run: terraform validate


      - name: "Terraform plan"
        id: plan
        run: terraform plan -no-color -input=false -out planfile.tfplan
        continue-on-error: true


      - name: Terraform plan status
        if: steps.plan.outcome == 'failure'
        run: |
          echo "Terraform plan failed. Please check the logs for details."
          exit 1


      - name: "Terraform apply"
        id: apple
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform destroy -no-color -input=false -auto-approve -parallelism=1 #planfile.tfplan


      - name: "configure aws credentials"
        uses: aws-actions/configure-aws-credentials@v1
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}
    
      - name: "Configure kubectl"
        id: getconfi
        if: steps.apple.outcome == 'success'
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
      

      - name: Install Ingress controller
        if: steps.apple.outcome == 'success' && steps.getconfig.outcome == 'success'
        run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.1.3/deploy/static/provider/aws/deploy.yaml
      